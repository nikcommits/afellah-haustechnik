<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" data-ase="meta.description">
  <meta property="og:title" data-ase="meta.title">
  <meta property="og:description" data-ase="meta.description">
  <title data-ase="meta.title">Afellah Haustechnik</title>
  <link rel="stylesheet" href="afellah-tokens.css?v=1">
  <script src="./scripts/ase-bridge.js"></script>
  <script src="./content/content.js"></script>
</head>
<body>

<!-- Header -->
<header class="site">
  <div class="wrap">
    <div class="row">
      <div class="logo" data-ase="header.logo"></div>
      <nav>
        <a href="#leistungen">Leistungen</a>
        <a href="#ablauf">Ablauf</a>
        <a href="#kontakt">Kontakt</a>
      </nav>
      <div class="ctas">
        <a href="#kontakt" class="btn btn-primary" data-ase="header.cta.text"></a>
      </div>
    </div>
  </div>
</header>

<!-- Hero -->
<section class="hero" id="hero">
  <div class="wrap">
    <div class="content">
      <div class="text">
        <div class="eyebrow" data-ase="hero.eyebrow"></div>
        <h1 class="h1" data-ase="hero.title"></h1>
        <p class="lead" data-ase="hero.lead"></p>
        <div style="margin-top: 28px;">
          <a href="#kontakt" class="btn btn-primary" data-ase="hero.cta_primary.text"></a>
        </div>
      </div>
      <div class="image">
        <img data-ase="hero.image">
      </div>
    </div>
  </div>
</section>

<!-- Leistungen -->
<section id="leistungen">
  <div class="wrap">
    <div class="section-header">
      <div class="eyebrow" data-ase="leistungen.eyebrow"></div>
      <h2 class="h2" data-ase="leistungen.title"></h2>
      <p class="lead" data-ase="leistungen.lead"></p>
    </div>
    
    <div class="cards-grid" data-ase="leistungen.items">
      <template>
        <div class="card">
          <div class="num" data-ase-item="num"></div>
          <h3 class="h3" data-ase-item="title"></h3>
          <p class="text" data-ase-item="text"></p>
          <div class="label" data-ase-item="label"></div>
        </div>
      </template>
    </div>
  </div>
</section>

<!-- Ablauf -->
<section id="ablauf" style="background: var(--paper-2);">
  <div class="wrap">
    <div class="section-header">
      <div class="eyebrow" data-ase="ablauf.eyebrow"></div>
      <h2 class="h2" data-ase="ablauf.title"></h2>
      <p class="lead" data-ase="ablauf.lead"></p>
    </div>

    <div class="cards-grid" data-ase="ablauf.steps">
      <template>
        <div class="card">
          <div class="num" data-ase-item="num"></div>
          <h3 class="h3" data-ase-item="title"></h3>
          <p class="text" data-ase-item="text"></p>
          <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--hair);">
            <span style="display: inline-block; padding: 6px 12px; background: var(--blue); color: #fff; border-radius: 20px; font-size: 11px; font-weight: 600;" data-ase-item="pill"></span>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>

<!-- Social Proof -->
<section id="testimonials">
  <div class="wrap">
    <div class="section-header">
      <div class="eyebrow" data-ase="social_proof.eyebrow"></div>
      <h2 class="h2" data-ase="social_proof.title"></h2>
    </div>

    <div class="cards-grid" data-ase="social_proof.items">
      <template>
        <div class="card">
          <p style="font-size: 14px; font-style: italic; margin: 0 0 16px; color: var(--ink-3);" data-ase-item="quote"></p>
          <p style="font-size: 13px; font-weight: 600; color: var(--ink); margin: 0;" data-ase-item="author"></p>
          <div style="margin-top: 8px; color: var(--mute); font-size: 12px;" data-ase-item="rating"></div>
        </div>
      </template>
    </div>
  </div>
</section>

<!-- Kontakt -->
<section id="kontakt" style="background: var(--paper-2);">
  <div class="wrap">
    <div class="section-header">
      <div class="eyebrow" data-ase="kontakt.eyebrow"></div>
      <h2 class="h2" data-ase="kontakt.title"></h2>
      <p class="lead" data-ase="kontakt.lead"></p>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 28px; max-width: 900px; margin: 0 auto;">
      <div data-ase="kontakt.side_info">
        <template>
          <div class="card" style="text-align: center;">
            <div style="width: 40px; height: 40px; background: var(--blue-tint); border-radius: 8px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: var(--blue);" data-ase-item="icon"></div>
            <h3 class="h3" style="font-size: 16px; margin: 0 0 8px;" data-ase-item="title"></h3>
            <p class="text" style="margin: 0; font-size: 13px;" data-ase-item="text"></p>
          </div>
        </template>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="site">
  <div class="wrap">
    <div class="top">
      <div class="col brand-col">
        <p data-ase="footer.brand_desc"></p>
        <p style="font-size: 12px; color: var(--mute); margin-top: 16px;" data-ase="footer.hours"></p>
      </div>
      <div class="col">
        <h4 data-ase="footer.col1_title"></h4>
        <ul data-ase="footer.col1_links">
          <template>
            <li><a data-ase-item="text" data-ase-href="href"></a></li>
          </template>
        </ul>
      </div>
      <div class="col">
        <h4 data-ase="footer.col3_title"></h4>
        <ul data-ase="footer.col3_links">
          <template>
            <li><a data-ase-item="text" data-ase-href="href"></a></li>
          </template>
        </ul>
      </div>
    </div>
    <div class="bottom">
      <span data-ase="footer.copyright"></span>
      <div>
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
